    function getContentForId(id) {
      return CONTENT[id] || {
        title: "Page Not Found",
        body: [{ type: "intro", text: "This page content is not yet available in the demo." }]
      };
    }

    function getAllPages() {
      const pages = [];
      function walk(items) {
        items.forEach(item => {
          if (item.content) {
            pages.push({ id: item.content, label: item.label, parentLabel: null });
          }
          if (item.children) walk(item.children);
        });
      }
      walk(PRODUCT_TREE);
      return pages;
    }

    const ALL_PAGES = getAllPages();

    function renderContent(content) {
      if (!content) return null;
      
      if (typeof content === "string") {
        return <p style={styles.paragraph}>{content}</p>;
      }

      if (Array.isArray(content)) {
        return content.map((item, idx) => renderContentBlock(item, idx));
      }

      return renderContentBlock(content);
    }

    function renderContentBlock(block, key = 0) {
      if (!block) return null;
      const { type, text, title, html, variant, items, rows } = block;

      switch (type) {
        case "intro":
          return <p key={key} style={styles.intro}>{text}</p>;
        case "heading":
          return <h2 key={key} style={styles.h2}>{text}</h2>;
        case "paragraph":
          return <p key={key} style={styles.paragraph}>{text}</p>;
        case "callout":
          return (
            <div key={key} style={{ ...styles.callout, borderLeftColor: variant === "tip" ? "#00A661" : variant === "warning" ? "#FFC107" : "#0069a8" }}>
              {title && <div style={styles.calloutHeader}>{title}</div>}
              <div style={styles.calloutText}>{text}</div>
            </div>
          );
        case "list":
          return (
            <ul key={key} style={styles.list}>
              {items?.map((item, i) => (
                <li key={i} style={styles.listItem}>{item}</li>
              ))}
            </ul>
          );
        case "steps":
          return (
            <div key={key} style={styles.steps}>
              {items?.map((item, i) => (
                <div key={i} style={styles.stepItem}>
                  <div style={styles.stepNum}>{i + 1}</div>
                  <div>{item}</div>
                </div>
              ))}
            </div>
          );
        case "table":
          return (
            <div key={key} style={styles.tableWrap}>
              <table style={styles.table}>
                <tbody>
                  {rows?.map((row, i) => (
                    <tr key={i} style={row.header ? {} : (i % 2 === 1 ? { backgroundColor: "#f8f9fb" } : {})}>
                      {row.cells?.map((cell, j) => (
                        row.header ? (
                          <th key={j} style={styles.th}>{cell}</th>
                        ) : (
                          <td key={j} style={styles.td}>{cell}</td>
                        )
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        case "grid":
          return (
            <div key={key} style={styles.grid}>
              {items?.map((item, i) => (
                <div key={i} style={styles.gridCard}>
                  <div style={styles.gridTitle}>{item.title}</div>
                  <div style={styles.gridDesc}>{item.desc}</div>
                </div>
              ))}
            </div>
          );
        default:
          return null;
      }
    }

    function DocsPortal() {
      const [selectedId, setSelectedId] = useState("gs-overview");
      const [searchOpen, setSearchOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [platform, setPlatform] = useState("all");
      const searchInputRef = useRef(null);

      const searchResults = useMemo(() => {
        if (!searchQuery.trim()) return [];
        const q = searchQuery.toLowerCase();
        return ALL_PAGES.filter(page => 
          page.label.toLowerCase().includes(q) ||
          page.id.toLowerCase().includes(q)
        ).slice(0, 10);
      }, [searchQuery]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "k") {
            e.preventDefault();
            setSearchOpen(true);
          }
          if (e.key === "Escape") setSearchOpen(false);
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, []);

      useEffect(() => {
        if (searchOpen && searchInputRef.current) {
          searchInputRef.current.focus();
        }
      }, [searchOpen]);

      const currentContent = getContentForId(selectedId);
      const currentPageIndex = ALL_PAGES.findIndex(p => p.id === selectedId);
      const prevPage = currentPageIndex > 0 ? ALL_PAGES[currentPageIndex - 1] : null;
      const nextPage = currentPageIndex < ALL_PAGES.length - 1 ? ALL_PAGES[currentPageIndex + 1] : null;

      const breadcrumbs = [];
      function findBreadcrumbs(items, target, path = []) {
        for (let item of items) {
          if (item.content === target) {
            return [...path, item];
          }
          if (item.children) {
            const result = findBreadcrumbs(item.children, target, [...path, item]);
            if (result) return result;
          }
        }
        return null;
      }
      const crumbPath = findBreadcrumbs(PRODUCT_TREE, selectedId) || [];

      return (
        <div style={styles.portal}>
          {/* Header */}
          <div style={styles.header}>
            <div style={styles.headerContent}>
              <div>
                <div style={styles.logo}>i3 Knowledge Base</div>
                <div style={styles.subtitle}>Interactive Demo</div>
              </div>
              <button
                style={styles.searchBtn}
                onClick={() => setSearchOpen(true)}
              >
                🔍 Search <span style={styles.kbd}>⌘K</span>
              </button>
            </div>
          </div>

          {/* Search Overlay */}
          {searchOpen && (
            <div style={styles.searchOverlay} onClick={() => setSearchOpen(false)}>
              <div style={styles.searchModal} onClick={(e) => e.stopPropagation()}>
                <div style={styles.searchInputWrap}>
                  <span>🔍</span>
                  <input
                    ref={searchInputRef}
                    type="text"
                    placeholder="Search documentation..."
                    style={styles.searchInput}
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
                <div style={styles.searchResults}>
                  {searchResults.length > 0 ? (
                    searchResults.map((page) => (
                      <button
                        key={page.id}
                        style={styles.searchResult}
                        onClick={() => {
                          setSelectedId(page.id);
                          setSearchOpen(false);
                          setSearchQuery("");
                        }}
                      >
                        <div style={styles.searchResultTitle}>{page.label}</div>
                        <div style={styles.searchResultPath}>{page.id}</div>
                      </button>
                    ))
                  ) : searchQuery ? (
                    <div style={styles.searchEmpty}>No results found</div>
                  ) : (
                    <div style={styles.searchEmpty}>Type to search...</div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Main Layout */}
          <div style={styles.mainContent}>
            {/* Sidebar */}
            <div style={styles.sidebar}>
              <div style={styles.sidebarScroll}>
                {PRODUCT_TREE.map((section) => (
                  <TreeNode
                    key={section.id}
                    item={section}
                    selected={selectedId}
                    onSelect={setSelectedId}
                    level={0}
                  />
                ))}
              </div>
            </div>

            {/* Content Area */}
            <div style={styles.contentArea}>
              {/* Breadcrumbs */}
              <div style={styles.breadcrumbs}>
                {crumbPath.map((item, idx) => (
                  <React.Fragment key={item.id}>
                    {idx > 0 && <span style={styles.breadcrumbSep}>›</span>}
                    {item.content === selectedId ? (
                      <span style={styles.breadcrumbActive}>{item.label}</span>
                    ) : (
                      <button
                        style={styles.breadcrumbLink}
                        onClick={() => setSelectedId(item.content)}
                      >
                        {item.label}
                      </button>
                    )}
                  </React.Fragment>
                ))}
              </div>

              {/* Page Content */}
              <div>
                <h1 style={styles.pageTitle}>{currentContent.title}</h1>
                <div style={styles.meta}>
                  {currentContent.updated && (
                    <>
                      <span>Updated {currentContent.updated}</span>
                      <span style={styles.metaDot}>•</span>
                    </>
                  )}
                  {currentContent.readTime && (
                    <>
                      <span>{currentContent.readTime} read</span>
                      <span style={styles.metaDot}>•</span>
                    </>
                  )}
                  {currentContent.tags?.map((tag) => (
                    <span key={tag} style={styles.tag}>{tag}</span>
                  ))}
                </div>
              </div>

              <div style={styles.contentBody}>
                {renderContent(currentContent.body)}
              </div>

              {/* Prev / Next */}
              {(prevPage || nextPage) && (
                <div style={styles.prevNext}>
                  {prevPage ? (
                    <button
                      style={styles.prevNextBtn}
                      onClick={() => setSelectedId(prevPage.id)}
                    >
                      <span style={styles.prevNextLabel}>← Previous</span>
                      <span style={styles.prevNextTitle}>{prevPage.label}</span>
                    </button>
                  ) : <div />}
                  {nextPage ? (
                    <button
                      style={styles.prevNextBtn}
                      onClick={() => setSelectedId(nextPage.id)}
                    >
                      <span style={styles.prevNextLabel}>Next →</span>
                      <span style={styles.prevNextTitle}>{nextPage.label}</span>
                    </button>
                  ) : <div />}
                </div>
              )}

              {/* Feedback */}
              <div style={styles.feedback}>
                <span style={{ fontSize: 13, color: "#666" }}>Was this helpful?</span>
                <button style={styles.feedbackBtn}>👍 Yes</button>
                <button style={styles.feedbackBtn}>👎 No</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TreeNode({ item, selected, onSelect, level }) {
      const [expanded, setExpanded] = useState(level === 0);

      if (item.content) {
        return (
          <button
            style={{
              ...styles.treeNode,
              paddingLeft: 16 + level * 16,
              backgroundColor: item.content === selected ? "#e8f4fa" : "transparent",
              color: item.content === selected ? "#00588F" : "#555",
              fontWeight: item.content === selected ? 600 : 400,
            }}
            onClick={() => onSelect(item.content)}
          >
            {item.label}
          </button>
        );
      }

      return (
        <div>
          <button
            style={{
              ...styles.treeNode,
              paddingLeft: 16 + level * 16,
              display: "flex",
              alignItems: "center",
              gap: 4,
              fontWeight: 600,
              color: "#002447",
            }}
            onClick={() => setExpanded(!expanded)}
          >
            <span style={{ fontSize: 10, width: 10, textAlign: "center" }}>
              {item.children && item.children.length > 0 ? (expanded ? "▼" : "▶") : ""}
            </span>
            {item.label}
          </button>
          {expanded && item.children && item.children.map((child) => (
            <TreeNode
              key={child.id}
              item={child}
              selected={selected}
              onSelect={onSelect}
              level={level + 1}
            />
          ))}
        </div>
      );
    }

    const styles = {
      portal: { display: "flex", flexDirection: "column", minHeight: "100vh", backgroundColor: "#f5f8fb", fontFamily: "inherit" },
      header: { backgroundColor: "#fff", borderBottom: "1px solid #dde4ec", padding: "16px 24px", boxShadow: "0 1px 3px rgba(0,36,71,0.05)" },
      headerContent: { maxWidth: 1400, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" },
      logo: { fontSize: 18, fontWeight: 700, color: "#002447" },
      subtitle: { fontSize: 12, color: "#888", marginTop: 2 },
      searchBtn: { padding: "8px 14px", border: "1px solid #dde4ec", borderRadius: 6, background: "#f5f8fb", cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", gap: 6 },
      kbd: { fontSize: 10, padding: "2px 6px", borderRadius: 3, border: "1px solid #ddd", backgroundColor: "#eee", color: "#888" },
      mainContent: { display: "flex", flex: 1, maxWidth: 1400, width: "100%", margin: "0 auto" },
      sidebar: { width: 240, backgroundColor: "#fff", borderRight: "1px solid #dde4ec", maxHeight: "calc(100vh - 60px)", position: "sticky", top: 60 },
      sidebarScroll: { overflowY: "auto", maxHeight: "calc(100vh - 60px)" },
      treeNode: { display: "block", width: "100%", textAlign: "left", border: "none", padding: "10px 16px", cursor: "pointer", fontSize: 13, transition: "all 0.08s", borderLeft: "3px solid transparent" },
      contentArea: { flex: 1, maxWidth: 800, margin: "0 auto", padding: "28px 44px 60px 44px" },
      breadcrumbs: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 2, marginBottom: 16, fontSize: 13 },
      breadcrumbLink: { background: "none", border: "none", color: "#00588F", cursor: "pointer", fontSize: 13, padding: "2px 4px", borderRadius: 3 },
      breadcrumbActive: { background: "none", border: "none", color: "#002447", fontWeight: 600, fontSize: 13, padding: "2px 4px", cursor: "default" },
      breadcrumbSep: { color: "#bbb", margin: "0 3px", fontSize: 12 },
      pageTitle: { fontSize: 30, fontWeight: 800, letterSpacing: "-0.02em", margin: "0 0 10px 0", color: "#002447", lineHeight: 1.25 },
      meta: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 8, fontSize: 13, color: "#777", marginBottom: 28, paddingBottom: 20, borderBottom: "1px solid #eee" },
      metaDot: { color: "#ccc" },
      tag: { fontSize: 11, padding: "2px 8px", borderRadius: 3, backgroundColor: "#e8f4fa", color: "#00588F", fontWeight: 500 },
      contentBody: { display: "flex", flexDirection: "column", gap: 0 },
      intro: { fontSize: 17, lineHeight: 1.75, color: "#333", marginBottom: 24 },
      h2: { fontSize: 21, fontWeight: 700, margin: "36px 0 14px 0", color: "#002447", letterSpacing: "-0.01em" },
      paragraph: { fontSize: 15, lineHeight: 1.75, color: "#333", margin: "0 0 16px 0" },
      callout: { borderLeft: "4px solid", borderRadius: "0 8px 8px 0", padding: "14px 18px", margin: "14px 0 18px 0" },
      calloutHeader: { display: "flex", alignItems: "center", fontSize: 14, fontWeight: 700, marginBottom: 4, color: "#002447" },
      calloutText: { fontSize: 14, lineHeight: 1.65, margin: 0, color: "#333" },
      list: { margin: "0 0 16px 0", paddingLeft: 24 },
      listItem: { fontSize: 15, lineHeight: 1.75, color: "#333", marginBottom: 5 },
      steps: { listStyle: "none", padding: 0, margin: "0 0 16px 0" },
      stepItem: { display: "flex", alignItems: "flex-start", gap: 12, padding: "11px 0", borderBottom: "1px solid #f0f0f0", fontSize: 15, lineHeight: 1.65, color: "#333" },
      stepNum: { flexShrink: 0, width: 26, height: 26, borderRadius: "50%", backgroundColor: "#00588F", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700 },
      tableWrap: { overflowX: "auto", margin: "10px 0 22px 0", borderRadius: 8, border: "1px solid #dde1e6" },
      table: { width: "100%", borderCollapse: "collapse", fontSize: 14 },
      th: { textAlign: "left", padding: "11px 16px", backgroundColor: "#f4f5f7", fontWeight: 700, borderBottom: "1px solid #dde1e6", color: "#002447", fontSize: 12 },
      td: { padding: "11px 16px", borderBottom: "1px solid #f0f0f0", color: "#333" },
      grid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, margin: "10px 0 22px 0" },
      gridCard: { display: "flex", flexDirection: "column", gap: 6, padding: "18px", borderRadius: 8, border: "1px solid #dde1e6" },
      gridTitle: { fontSize: 15, fontWeight: 700, color: "#00588F" },
      gridDesc: { fontSize: 14, color: "#002447", lineHeight: 1.55 },
      prevNext: { display: "flex", justifyContent: "space-between", gap: 16, marginTop: 44, paddingTop: 22, borderTop: "1px solid #eee" },
      prevNextBtn: { background: "none", border: "1px solid #dde1e6", borderRadius: 8, padding: "14px 18px", cursor: "pointer", display: "flex", flexDirection: "column", gap: 4, minWidth: 180, flex: 1 },
      prevNextLabel: { fontSize: 12, color: "#888", fontWeight: 500 },
      prevNextTitle: { fontSize: 15, fontWeight: 600, color: "#00588F" },
      feedback: { display: "flex", alignItems: "center", gap: 10, marginTop: 22, padding: "16px 0", borderTop: "1px solid #eee" },
      feedbackBtn: { fontSize: 13, padding: "5px 14px", borderRadius: 6, border: "1px solid #dde1e6", background: "#fff", cursor: "pointer", color: "#555" },
      searchOverlay: { position: "fixed", inset: 0, backgroundColor: "rgba(0,36,71,0.4)", display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: 80, zIndex: 100 },
      searchModal: { width: 580, maxHeight: "60vh", backgroundColor: "#fff", borderRadius: 12, boxShadow: "0 20px 60px rgba(0,36,71,0.2)", display: "flex", flexDirection: "column", overflow: "hidden" },
      searchInputWrap: { display: "flex", alignItems: "center", padding: "16px 18px", borderBottom: "1px solid #eee", gap: 10 },
      searchInput: { flex: 1, border: "none", outline: "none", fontSize: 16, fontFamily: "inherit", color: "#002447", background: "transparent" },
      searchResults: { overflowY: "auto", padding: "8px" },
      searchResult: { display: "flex", flexDirection: "column", gap: 2, width: "100%", padding: "11px 14px", border: "none", background: "none", cursor: "pointer", textAlign: "left", borderRadius: 6 },
      searchResultTitle: { fontSize: 15, fontWeight: 600, color: "#002447" },
      searchResultPath: { fontSize: 12, color: "#888" },
      searchEmpty: { padding: "20px", textAlign: "center", color: "#888", fontSize: 14 },
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DocsPortal />);
  </script>
</body>
