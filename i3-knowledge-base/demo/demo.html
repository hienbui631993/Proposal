<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i3 International — Documentation</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.7;color:#1A2534;background:#f8f9fb}
button{font-family:inherit}
#root{display:flex;flex-direction:column;height:100vh}

/* Header */
.header{display:flex;align-items:center;height:72px;border-bottom:1px solid #dde1e6;background:#fff;padding:0 20px;gap:16px;flex-shrink:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-weight:800;font-size:24px;color:#1A2534;letter-spacing:-0.03em}
.logo-sub{font-size:14px;color:#00588F;font-weight:500;letter-spacing:0.02em;margin-left:6px}
.search-btn{flex:1;max-width:480px;display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px solid #dde1e6;border-radius:8px;background:#f4f5f7;cursor:pointer;font-size:14px;color:#888}
.search-btn:hover{border-color:#bbb}
.kbd{font-size:10px;padding:2px 5px;border-radius:3px;border:1px solid #ddd;background:#eee;color:#888;font-family:monospace}
.header-right{display:flex;align-items:center;gap:8px}
.version-badge{font-size:12px;padding:4px 12px;border-radius:6px;background:#e8f4fa;color:#00588F;font-weight:600;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;gap:4px}
.version-badge.active{border-color:#00588F}
.drop-arrow{font-size:8px;opacity:0.6}
.dropdown{position:absolute;top:calc(100% + 6px);right:0;min-width:190px;background:#fff;border-radius:10px;border:1px solid #dde1e6;box-shadow:0 8px 24px rgba(0,36,71,0.12);z-index:50;padding:4px 0;display:none}
.dropdown.open{display:block}
.drop-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#888;padding:8px 14px 4px}
.drop-item{display:block;width:100%;padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#1A2534;text-align:left;font-weight:500}
.drop-item:hover{background:#f4f5f7}
.drop-item.disabled{opacity:0.5;cursor:default}

/* Body layout */
.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:268px;border-right:1px solid #dde1e6;background:#fff;flex-shrink:0;overflow-y:auto;padding:4px 0 20px}
.side-item{display:flex;align-items:center;width:100%;padding:7px 14px;border:none;background:none;cursor:pointer;font-size:14px;text-align:left;line-height:1.5;transition:all 0.1s;border-right:3px solid transparent}
.side-item:hover{background:#f4f5f7}
.side-item.active{color:#00588F;background:#e8f4fa;border-right-color:#00588F}
.side-item.top{font-weight:700;color:#1A2534;margin-top:8px}
.side-item.section{font-weight:600;color:#444}
.side-arrow{font-size:10px;opacity:0.5;transition:transform 0.15s;display:inline-block}
.side-arrow.open{transform:rotate(90deg)}

/* Main content */
.main{flex:1;display:flex;overflow:auto}
.content-area{flex:1;max-width:800px;margin:0 auto;padding:28px 44px 60px}
.breadcrumbs{display:flex;align-items:center;flex-wrap:wrap;gap:2px;margin-bottom:16px;font-size:13px}
.bc-link{background:none;border:none;color:#00588F;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px}
.bc-link:hover{text-decoration:underline}
.bc-active{background:none;border:none;color:#1A2534;font-weight:600;font-size:13px;padding:2px 4px;cursor:default}
.bc-sep{color:#bbb;margin:0 3px;font-size:12px}

.page-title{font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:10px;color:#1A2534;line-height:1.25}
.meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:13px;color:#777;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #eee}
.meta-dot{color:#ccc}
.tag{font-size:11px;padding:2px 8px;border-radius:3px;background:#e8f4fa;color:#00588F;font-weight:500;margin-left:4px}

/* Content blocks */
.intro{font-size:17px;line-height:1.75;color:#333;margin-bottom:24px}
.content-h2{font-size:21px;font-weight:700;margin:36px 0 14px;color:#1A2534;letter-spacing:-0.01em}
.content-p{font-size:15px;line-height:1.75;color:#333;margin:0 0 16px}

/* Callout */
.callout{border-left:4px solid;border-radius:0 8px 8px 0;padding:14px 18px;margin:14px 0 18px}
.callout.info{background:#e8f4fa;border-left-color:#00588F}
.callout.warning{background:#fef3e0;border-left-color:#f5a623}
.callout.tip{background:#fdf0f5;border-left-color:#DF1E71}
.callout-header{display:flex;align-items:center;font-size:14px;font-weight:700;margin-bottom:4px;color:#1A2534}
.callout-icon{margin-right:8px;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.callout.info .callout-icon{background:#00588F}
.callout.warning .callout-icon{background:#f5a623}
.callout.tip .callout-icon{background:#DF1E71}
.callout-text{font-size:14px;line-height:1.65;color:#333}

/* List */
.content-ul{margin:0 0 16px;padding-left:24px}
.content-ul li{font-size:15px;line-height:1.75;color:#333;margin-bottom:5px}

/* Steps */
.steps-list{list-style:none;padding:0;margin:0 0 16px}
.step-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0;font-size:15px;line-height:1.65;color:#333}
.step-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#00588F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* Table */
.table-wrap{overflow-x:auto;margin:10px 0 22px;border-radius:8px;border:1px solid #dde1e6}
.doc-table{width:100%;border-collapse:collapse;font-size:14px}
.doc-table th{text-align:left;padding:11px 16px;background:#f4f5f7;font-weight:700;border-bottom:1px solid #dde1e6;color:#1A2534;font-size:12px;letter-spacing:0.03em;text-transform:uppercase}
.doc-table td{padding:11px 16px;border-bottom:1px solid #f0f0f0;color:#333}
.doc-table tr:nth-child(even) td{background:#f8f9fb}

/* Code */
.code-wrap{border-radius:8px;overflow:hidden;margin:10px 0 22px;border:1px solid #dde1e6}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:#f4f5f7;border-bottom:1px solid #dde1e6}
.code-lang{font-size:11px;font-weight:600;color:#888;text-transform:uppercase}
.copy-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.code-pre{margin:0;padding:16px 18px;background:#002447;color:#d4dbe6;font-size:14px;line-height:1.55;overflow-x:auto;font-family:'Helvetica Neue',Consolas,monospace;white-space:pre-wrap}

/* Grid */
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0 22px}
.grid-card{display:flex;flex-direction:column;gap:6px;padding:18px;border-radius:8px;border:1px solid #dde1e6;background:#fff}
.grid-title{font-size:15px;font-weight:700;color:#00588F}
.grid-desc{font-size:14px;color:#1A2534;line-height:1.55}

/* Tabs */
.tabs-wrap{margin:10px 0 22px;border:1px solid #dde1e6;border-radius:8px;overflow:hidden}
.tab-bar{display:flex;border-bottom:1px solid #dde1e6;background:#f4f5f7}
.tab-btn{padding:9px 18px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;border-bottom:2px solid transparent;color:#666;font-weight:400}
.tab-btn.active{border-bottom-color:#00588F;color:#00588F;font-weight:600}
.tab-content{padding:12px 16px}

/* Prev/Next */
.prev-next{display:flex;justify-content:space-between;gap:16px;margin-top:44px;padding-top:22px;border-top:1px solid #eee}
.pn-btn{background:none;border:1px solid #dde1e6;border-radius:8px;padding:14px 18px;cursor:pointer;display:flex;flex-direction:column;gap:4px;min-width:180px;text-align:left}
.pn-btn.right{text-align:right}
.pn-btn:hover{border-color:#00588F}
.pn-label{font-size:12px;color:#888;font-weight:500}
.pn-title{font-size:15px;font-weight:600;color:#00588F}

/* Feedback */
.feedback{display:flex;align-items:center;gap:10px;margin-top:22px;padding:16px 0;border-top:1px solid #eee}
.feedback span{font-size:13px;color:#666}
.fb-btn{font-size:13px;padding:5px 14px;border-radius:6px;border:1px solid #dde1e6;background:#fff;cursor:pointer;display:inline-flex;align-items:center;color:#555;gap:4px}
.fb-btn:hover{border-color:#00588F}
.fb-btn svg{vertical-align:middle}

/* TOC */
.toc{width:210px;flex-shrink:0;padding:30px 18px;position:sticky;top:0;align-self:flex-start;max-height:calc(100vh - 72px);overflow-y:auto}
.toc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin-bottom:14px}
.toc-item{font-size:13px;color:#555;padding:5px 0 5px 12px;cursor:pointer;line-height:1.5;border-left:2px solid #dde1e6;margin-bottom:2px}
.toc-item:hover{color:#00588F;border-left-color:#00588F}

/* Search overlay */
.search-overlay{position:fixed;inset:0;background:rgba(0,36,71,0.4);display:flex;align-items:flex-start;justify-content:center;padding-top:80px;z-index:100}
.search-overlay.hidden{display:none}
.search-modal{width:580px;max-height:60vh;background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,36,71,0.2);display:flex;flex-direction:column;overflow:hidden}
.search-input-wrap{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid #eee;gap:10px}
.search-input{flex:1;border:none;outline:none;font-size:16px;font-family:inherit;color:#1A2534}
.search-results{overflow-y:auto;padding:8px}
.search-result{display:flex;flex-direction:column;gap:2px;width:100%;padding:11px 14px;border:none;background:none;cursor:pointer;text-align:left;border-radius:6px}
.search-result:hover{background:#f4f5f7}
.search-result-title{font-size:15px;font-weight:600;color:#1A2534}
.search-result-path{font-size:12px;color:#888}
.search-empty{padding:20px;text-align:center;color:#888;font-size:14px}
</style>
</head>

  "mob-video-settings": {
    title: "Video Quality & Frame Rate",
    updated: "2026-03-10",
    readTime: "3 min",
    tags: ["settings", "video", "quality", "fps"],
    body: [
      { type: "intro", text: "Adjust video quality and frame rate to balance image clarity against data usage and device performance. These settings apply to all channels of the connected server." },
      { type: "heading", text: "Frame Rate" },
      { type: "paragraph", text: "The frame rate can be set from 1 fps to 30 fps. Lower frame rates reduce data consumption but produce choppier video. Higher frame rates give smoother playback but use more bandwidth." },
      { type: "heading", text: "Video Quality" },
      { type: "paragraph", text: "Video quality can be set from 10% to 100% in 10% increments. Lower quality reduces data usage at the cost of image clarity. Higher quality produces sharper images but increases bandwidth consumption." },
      { type: "heading", text: "Recommended Settings" },
      {
        type: "table",
        headers: ["Connection Type", "Frame Rate", "Video Quality", "Notes"],
        rows: [
          ["Wi-Fi (local)", "15–30 fps", "70–100%", "Best quality, no data charges"],
          ["Wi-Fi (remote)", "10–20 fps", "50–80%", "Balance quality with network latency"],
          ["Cellular (LTE)", "5–10 fps", "30–50%", "Minimize data usage"],
          ["Cellular (roaming)", "1–5 fps", "10–30%", "Absolute minimum to reduce roaming charges"],
        ],
      },
      { type: "callout", variant: "info", title: "How to Access", text: "Connect to a server first, then access Settings. On iOS, tap Settings. On Android/BlackBerry, press Menu → Setting." },
    ],
  },

function flattenTree(nodes, parent, depth) {
  parent = parent || null; depth = depth || 0;
  var r = [];
  nodes.forEach(function(n) {
    r.push(Object.assign({}, n, { parent: parent, depth: depth }));
    if (n.children) r = r.concat(flattenTree(n.children, n.id, depth + 1));
  });
  return r;
}
function getBreadcrumbs(id, flat) {
  var c = [], cur = flat.find(function(n){return n.id===id});
  while(cur){ c.unshift({id:cur.id,label:cur.label}); cur=flat.find(function(n){return n.id===cur.parent}); }
  return c;
}
function getContentNodes(flat){ return flat.filter(function(n){return n.content}); }

  function renderNode(node, depth) {
    var isActive = node.id === activeId;
    var hasChildren = node.children && node.children.length > 0;
    var isExpanded = expanded[node.id];
    var isTop = depth === 0;
    var btn = document.createElement("button");
    btn.className = "side-item" + (isActive ? " active" : "") + (isTop ? " top" : "") + (!node.content && hasChildren ? " section" : "");
    btn.style.paddingLeft = (isTop ? 12 : 12 + depth * 16) + "px";
    var label = '<span style="flex:1;text-align:left">' + node.label + '</span>';
    if (hasChildren) label += '<span class="side-arrow' + (isExpanded ? ' open' : '') + '">▶</span>';
    btn.innerHTML = label;
    btn.onclick = function() {
      if (node.content) selectPage(node.id);
      if (hasChildren) { expanded[node.id] = !expanded[node.id]; renderSidebar(); }
    };
    el.appendChild(btn);
    if (hasChildren && isExpanded) {
      node.children.forEach(function(c) { renderNode(c, depth + 1); });
    }
  }
  PRODUCT_TREE.forEach(function(n) { renderNode(n, 0); });
}

// ─── Render Content Block ────────────────────────────────────────────────────
function renderBlock(b) {
  if (b.type === "intro") return '<p class="intro">' + b.text + '</p>';
  if (b.type === "heading") return '<h2 class="content-h2">' + b.text + '</h2>';
  if (b.type === "paragraph") return '<p class="content-p">' + b.text + '</p>';
  if (b.type === "callout") {
    var icons = {info:"i",warning:"!",tip:"✓"};
    return '<div class="callout ' + b.variant + '"><div class="callout-header"><span class="callout-icon">' + (icons[b.variant]||"i") + '</span><strong>' + b.title + '</strong></div><p class="callout-text">' + b.text + '</p></div>';
  }
  if (b.type === "list") {
    return '<ul class="content-ul">' + b.items.map(function(x){return '<li>'+x+'</li>'}).join("") + '</ul>';
  }
  if (b.type === "steps") {
    return '<ol class="steps-list">' + b.items.map(function(x,i){return '<li class="step-item"><span class="step-num">'+(i+1)+'</span><span>'+x+'</span></li>'}).join("") + '</ol>';
  }
  if (b.type === "table") {
    var h = '<table class="doc-table"><thead><tr>' + b.headers.map(function(x){return '<th>'+x+'</th>'}).join("") + '</tr></thead><tbody>';
    h += b.rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>'}).join("")+'</tr>'}).join("");
    return '<div class="table-wrap">' + h + '</tbody></table></div>';
  }
  if (b.type === "code") {
    var id = "code_" + Math.random().toString(36).substr(2,6);
    return '<div class="code-wrap"><div class="code-header"><span class="code-lang">' + b.language + '</span><button class="copy-btn" onclick="copyCode(\'' + id + '\')">Copy</button></div><pre class="code-pre" id="' + id + '">' + b.code.replace(/</g,"&lt;") + '</pre></div>';
  }
  if (b.type === "tabs") {
    var keys = Object.keys(b.platforms);
    var tid = "tabs_" + Math.random().toString(36).substr(2,6);
    var h = '<div class="tabs-wrap" id="'+tid+'"><div class="tab-bar">';
    keys.forEach(function(k,i){
      h += '<button class="tab-btn' + (i===0?' active':'') + '" onclick="switchTab(\''+tid+'\',\''+k+'\')">' + k + '</button>';
    });
    h += '</div>';
    keys.forEach(function(k,i){
      h += '<div class="tab-content" data-tab="'+k+'" style="'+(i>0?'display:none':'')+'"><ol class="steps-list">';
      b.platforms[k].forEach(function(s,si){
        h += '<li class="step-item"><span class="step-num">'+(si+1)+'</span><span>'+s+'</span></li>';
      });
      h += '</ol></div>';
    });
    return h + '</div>';
  }
  if (b.type === "grid") {
    return '<div class="content-grid">' + b.items.map(function(x){return '<div class="grid-card"><strong class="grid-title">'+x.title+'</strong><span class="grid-desc">'+x.desc+'</span></div>'}).join("") + '</div>';
  }
  return "";
}

function switchTab(wrapId, tabKey) {
  var wrap = document.getElementById(wrapId);
  wrap.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  wrap.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none'});
  wrap.querySelectorAll('.tab-btn').forEach(function(b){ if(b.textContent.trim()===tabKey) b.classList.add('active') });
  var panel = wrap.querySelector('[data-tab="'+tabKey+'"]');
  if(panel) panel.style.display = '';
}

function copyCode(id) {
  var el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent);
}

// ─── Render Page ─────────────────────────────────────────────────────────────
function renderPage() {
  var node = flatNodes.find(function(n){return n.id===activeId});
  var content = CONTENT[node && node.content] || DEFAULT_CONTENT;
  var crumbs = getBreadcrumbs(activeId, flatNodes);
  var idx = contentNodes.findIndex(function(n){return n.id===activeId});
  var prev = idx > 0 ? contentNodes[idx-1] : null;
  var next = idx < contentNodes.length-1 ? contentNodes[idx+1] : null;

  var html = '';

  // Breadcrumbs
  html += '<div class="breadcrumbs">';
  crumbs.forEach(function(c, i) {
    if (i === crumbs.length - 1) {
      html += '<span class="bc-active">' + c.label + '</span>';
    } else {
      html += '<button class="bc-link" onclick="selectPage(\'' + c.id + '\')">' + c.label + '</button><span class="bc-sep">/</span>';
    }
  });
  html += '</div>';

  // Title + meta
  html += '<h1 class="page-title">' + content.title + '</h1>';
  html += '<div class="meta"><span>Updated: ' + content.updated + '</span><span class="meta-dot">·</span><span>' + content.readTime + ' read</span>';
  if (content.tags) content.tags.forEach(function(t){ html += '<span class="tag">' + t + '</span>'; });
  html += '</div>';

  // Body
  content.body.forEach(function(b){ html += renderBlock(b); });

  // Prev/Next
  html += '<div class="prev-next">';
  if (prev) {
    var pt = (CONTENT[prev.content] || DEFAULT_CONTENT).title;
    html += '<button class="pn-btn" onclick="selectPage(\'' + prev.id + '\')"><span class="pn-label">← Previous</span><span class="pn-title">' + pt + '</span></button>';
  } else html += '<div></div>';
  if (next) {
    var nt = (CONTENT[next.content] || DEFAULT_CONTENT).title;
    html += '<button class="pn-btn right" onclick="selectPage(\'' + next.id + '\')"><span class="pn-label">Next →</span><span class="pn-title">' + nt + '</span></button>';
  } else html += '<div></div>';
  html += '</div>';

  // Feedback
  html += '<div class="feedback"><span>Was this page helpful?</span>';
  html += '<button class="fb-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/></svg>Yes</button>';
  html += '<button class="fb-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/></svg>No</button>';
  html += '</div>';

  document.getElementById("contentArea").innerHTML = html;

  // TOC
  var tocHtml = '';
  var headings = content.body.filter(function(b){return b.type==="heading"});
  if (headings.length) {
    tocHtml = '<div class="toc-title">On this page</div>';
    headings.forEach(function(h){ tocHtml += '<div class="toc-item">' + h.text + '</div>'; });
  }
  document.getElementById("toc").innerHTML = tocHtml;
}

// ─── Select Page ─────────────────────────────────────────────────────────────
function selectPage(id) {
  var node = flatNodes.find(function(n){return n.id===id});
  if (!node || !node.content) return;
  activeId = id;
  // expand parents
  var cur = node;
  while (cur && cur.parent) { expanded[cur.parent] = true; cur = flatNodes.find(function(n){return n.id===cur.parent}); }
  renderSidebar();
  renderPage();
  document.querySelector('.main').scrollTop = 0;
}

// ─── Search ──────────────────────────────────────────────────────────────────
function openSearch() {
  document.getElementById("searchOverlay").classList.remove("hidden");
  var input = document.getElementById("searchInput");
  input.value = "";
  input.focus();
  renderSearchResults("");
}
function closeSearch() { document.getElementById("searchOverlay").classList.add("hidden"); }
function renderSearchResults(q) {
  var results;
  if (!q.trim()) { results = contentNodes.slice(0, 12); }
  else {
    var lq = q.toLowerCase();
    results = contentNodes.filter(function(n) {
      var c = CONTENT[n.content] || DEFAULT_CONTENT;
      var text = [n.label, c.title].concat(c.tags||[]).join(" ").toLowerCase();
      var body = c.body.map(function(b){return b.text||b.title||""}).join(" ").toLowerCase();
      return text.indexOf(lq) >= 0 || body.indexOf(lq) >= 0;
    });
  }
  var html = "";
  if (!results.length) html = '<div class="search-empty">No results for "' + q + '"</div>';
  results.forEach(function(n) {
    var c = CONTENT[n.content] || DEFAULT_CONTENT;
    var path = getBreadcrumbs(n.id, flatNodes).map(function(x){return x.label}).join(" → ");
    html += '<button class="search-result" onclick="selectPage(\'' + n.id + '\');closeSearch()"><span class="search-result-title">' + (c.title||n.label) + '</span><span class="search-result-path">' + path + '</span></button>';
  });
  document.getElementById("searchResults").innerHTML = html;
}

// ─── Dropdowns ───────────────────────────────────────────────────────────────
function closeDropdowns() {
  document.querySelectorAll('.dropdown').forEach(function(d){d.classList.remove('open')});
  document.querySelectorAll('.version-badge').forEach(function(b){b.classList.remove('active')});
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderSidebar();
renderPage();

// Menu toggle


// Search
document.getElementById("searchBtn").onclick = openSearch;
document.getElementById("searchOverlay").onclick = function(e) { if (e.target === this) closeSearch(); };
document.getElementById("searchInput").oninput = function() { renderSearchResults(this.value); };
document.addEventListener("keydown", function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); openSearch(); }
  if (e.key === "Escape") closeSearch();
});

// Dropdowns
document.getElementById("srxDrop").onclick = function() {
  var dd = document.getElementById("srxDropdown");
  var isOpen = dd.classList.contains("open");
  closeDropdowns();
  if (!isOpen) { dd.classList.add("open"); this.classList.add("active"); }
};
document.getElementById("vpcDrop").onclick = function() {
  var dd = document.getElementById("vpcDropdown");
  var isOpen = dd.classList.contains("open");
  closeDropdowns();
  if (!isOpen) { dd.classList.add("open"); this.classList.add("active"); }
};
document.addEventListener("mousedown", function(e) {
  if (!e.target.closest('.header-right')) closeDropdowns();
});
</script>
